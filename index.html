<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary | The Surprise</title>
    <style>
        :root { --primary: #bc6c25; --secondary: #fefae0; --bloom: #dda15e; --text: #283618; }
        body { font-family: 'Georgia', serif; background: var(--secondary); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Surprise Overlay */
        #surprise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #606c38; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1s ease-out, visibility 1s;
        }
        .gift-box { font-size: 80px; cursor: pointer; transition: transform 0.3s; }
        .gift-box:hover { transform: scale(1.1) rotate(5deg); }

        /* Main Hero Section */
        header { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative; 
            opacity: 0; transition: opacity 2s ease-in;
        }

        .photo-wrapper { position: relative; width: 250px; height: 250px; }
        .main-photo { 
            width: 100%; height: 100%; border-radius: 50%; 
            object-fit: cover; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 2;
        }

        /* Flower Blooming Animation */
        .flower {
            position: absolute; width: 80px; height: 80px; z-index: 1;
            opacity: 0; transform: scale(0); transition: all 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .reveal .flower { opacity: 1; transform: scale(1.2); }
        .f1 { top: -40px; left: 50%; }
        .f2 { bottom: -20px; right: -20px; }
        .f3 { bottom: -20px; left: -20px; }

        /* Rest of the Content */
        .content { max-width: 800px; margin: auto; padding: 40px 20px; display: none; }
        .timeline { border-left: 2px solid var(--primary); padding-left: 20px; text-align: left; margin: 20px 0; }
        .counter { font-size: 1.5rem; color: var(--primary); font-weight: bold; margin: 20px 0; }

    </style>
</head>
<body>

    <div id="surprise-overlay" onclick="openSurprise()">
        <div class="gift-box">🎁</div>
        <h2 style="color: white;">Click to open your surprise</h2>
    </div>

    <header id="main-header">
        <div class="photo-wrapper" id="photo-container">
            <img src="main-photo.jpg" alt="Our Best Photo" class="main-photo">
            
            <svg class="flower f1" viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#e63946"/><path d="M50 0 Q60 25 50 50 Q40 25 50 0Z" fill="#f1faee" transform="rotate(0 50 50)"/></svg>
            <svg class="flower f2" viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#ffb703"/><path d="M50 0 Q60 25 50 50 Q40 25 50 0Z" fill="#fb8500" transform="rotate(45 50 50)"/></svg>
            <svg class="flower f3" viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="#a8dadc"/><path d="M50 0 Q60 25 50 50 Q40 25 50 0Z" fill="#457b9d" transform="rotate(90 50 50)"/></svg>
        </div>
        
        <h1>[Name] & [Name]</h1>
        <div id="counter" class="counter"></div>
    </header>

    <div class="content" id="main-content">
        <section>
            <h2>Our Story</h2>
            <div class="timeline">
                <p><strong>[Date]:</strong> The day everything changed...</p>
                <p><strong>[Key Moment]:</strong> When we knew it was forever.</p>
            </div>
        </section>

        <section>
            <h2>My Letter to You</h2>
            <p style="font-style: italic; line-height: 1.8;">"Your heartfelt message goes here..."</p>
        </section>

        <section>
            <h2>Our Future</h2>
            <p>Dreams of [Trip/Goal] and many more years like this.</p>
        </section>

        <p style="text-align: center; margin-top: 50px;">Happy Anniversary. ❤️</p>
    </div>

    <script>
        function openSurprise() {
            // 1. Hide the box
            const overlay = document.getElementById('surprise-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.visibility = 'hidden', 1000);

            // 2. Reveal header and start "Bloom"
            const header = document.getElementById('main-header');
            header.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('photo-container').classList.add('reveal');
            }, 500);

            // 3. Show the rest of the content
            document.getElementById('main-content').style.display = 'block';
            updateCounter();
        }

        function updateCounter() {
            const start = new Date("2024-01-01"); // CHANGE THIS TO YOUR DATE
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("counter").innerText = `We've been happy for ${days} days.`;
        }
    </script>
</body>
</html>
