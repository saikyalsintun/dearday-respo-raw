<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary | Forever</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6d597a; --accent: #b56576; --bg: #f8edeb; --text: #355070; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg) url('https://www.transparenttextures.com/patterns/cubes.png'); 
            color: var(--text); margin: 0; text-align: center; line-height: 1.6; 
        }
        
        /* Entrance */
        #surprise-overlay { 
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; transition: 1s; cursor: pointer; 
        }
        
        header { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; transition: 1.5s; 
        }

        /* Photo Styles */
        .img-container { position: relative; display: inline-block; margin: 10px; }
        .main-photo { 
            width: 250px; height: 250px; border-radius: 50%; 
            object-fit: cover; border: 8px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        .gallery-img { width: 100%; height: 220px; border-radius: 12px; object-fit: cover; }

        /* Controls */
        .upload-btn { 
            position: absolute; bottom: 10px; right: 10px; background: var(--accent); 
            color: white; border: none; border-radius: 50%; width: 42px; height: 42px; 
            cursor: pointer; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }
        .delete-btn { 
            position: absolute; top: 10px; right: 10px; background: #333; 
            color: white; border: none; border-radius: 50%; width: 30px; height: 30px; 
            cursor: pointer; display: none; 
        }
        .img-container:hover .delete-btn { display: block; }

        .name-input { 
            background: transparent; border: none; border-bottom: 2px dashed var(--accent); 
            font-size: 2.2rem; text-align: center; color: var(--primary); 
            width: 200px; font-family: inherit; outline: none;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 30px; margin: 20px auto; max-width: 700px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
        }
        #youtube-player { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="youtube-player"></div>

<div id="surprise-overlay" onclick="openSurprise()">
    <div style="font-size: 100px;">🎁</div>
    <h2 style="color: white; font-weight: 300;">CLICK FOR A SURPRISE</h2>
</div>

<header id="main-header">
    <div class="img-container">
        <img src="https://via.placeholder.com/250?text=Hero+Photo" id="hero_photo" class="main-photo">
        <button class="upload-btn" onclick="triggerUpload('hero_photo')">+</button>
        <button class="delete-btn" onclick="deletePhoto('hero_photo')">×</button>
    </div>
    
    <div style="margin-top: 30px;">
        <input type="text" id="name1" class="name-input" placeholder="Name 1" onchange="saveText('name1', this.value)">
        <span style="font-size: 2rem; color: var(--accent); margin: 0 10px;">❤</span>
        <input type="text" id="name2" class="name-input" placeholder="Name 2" onchange="saveText('name2', this.value)">
    </div>
</header>

<div id="main-content" style="display: none; padding-bottom: 80px;">
    <section class="glass-card">
        <h2>Captured Moments</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="img-container">
                <img src="https://via.placeholder.com/300?text=Memory+1" id="gallery_1" class="gallery-img">
                <button class="upload-btn" onclick="triggerUpload('gallery_1')">+</button>
                <button class="delete-btn" onclick="deletePhoto('gallery_1')">×</button>
            </div>
            <div class="img-container">
                <img src="https://via.placeholder.com/300?text=Memory+2" id="gallery_2" class="gallery-img">
                <button class="upload-btn" onclick="triggerUpload('gallery_2')">+</button>
                <button class="delete-btn" onclick="deletePhoto('gallery_2')">×</button>
            </div>
        </div>
    </section>
    <input type="file" id="globalFile" style="display:none" onchange="handleFile(event)">
</div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1MAHkEhi84sOhdDPFPrNyJgmETlNU6wyNaTEHzgD7nQhD1ZgcsR3YXGeL8O44NGQ/exec"; 
    let activeTarget = "";

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', { height: '0', width: '0', videoId: 'dQw4w9WgXcQ', events: { 'onReady': () => {} } });
    }

    function openSurprise() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        if (player && player.playVideo) player.playVideo();
        document.getElementById('surprise-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('surprise-overlay').style.visibility = 'hidden';
            document.getElementById('main-header').style.opacity = '1';
            document.getElementById('main-content').style.display = 'block';
        }, 1000);
    }

    function triggerUpload(id) { activeTarget = id; document.getElementById('globalFile').click(); }

    async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "upload", key: activeTarget, base64: base64, type: file.type, name: file.name })
                });
                const res = await response.json();
                if (res.url) document.getElementById(activeTarget).src = res.url;
            } catch (err) { alert("Upload error. Check script deployment!"); }
        };
        reader.readAsDataURL(file);
    }

    async function saveText(key, value) {
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "save_text", key: key, value: value }) });
    }

    async function deletePhoto(id) {
        if(!confirm("Remove this photo?")) return;
        document.getElementById(id).src = "https://via.placeholder.com/300?text=Deleted";
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", key: id }) });
    }

    // Load YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
