<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Ultimate Site Engine</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --secondary: #06b6d4;
            --dark: #0f172a; --sidebar: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: #f1f5f9; overflow: hidden; }

        .app-shell { display: flex; height: 100vh; }

        /* ENGINE SIDEBAR */
        .engine-room {
            width: 420px; background: var(--sidebar); border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; box-shadow: 20px 0 50px rgba(0,0,0,0.05); z-index: 10;
        }

        .engine-header { padding: 20px; background: var(--dark); color: white; text-align: center; }
        .engine-header h1 { margin: 0; font-size: 1rem; letter-spacing: 2px; font-weight: 900; }
        
        .nav-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #fafafa; }
        .nav-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 800; color: #94a3b8; transition: 0.2s; border-bottom: 2px solid transparent; }
        .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: white; }

        .form-container { flex-grow: 1; overflow-y: auto; padding: 25px; }
        .field-label { display: block; font-size: 11px; font-weight: 900; color: #64748b; margin-bottom: 6px; text-transform: uppercase; margin-top: 15px; }
        .input-box { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; font-size: 14px; transition: 0.3s; box-sizing: border-box; }
        .input-box:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* VISUAL PRESETS */
        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .preset-btn { padding: 8px; border: 2px solid #f1f5f9; border-radius: 8px; background: white; cursor: pointer; font-size: 10px; font-weight: 700; }

        /* PREVIEW AREA */
        .preview-world { flex-grow: 1; padding: 40px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        #device {
            width: 100%; max-width: 500px; height: 90%; background: white;
            border-radius: 40px; box-shadow: 0 50px 100px rgba(15, 23, 42, 0.2);
            display: flex; flex-direction: column; overflow-y: auto;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #device-inner { padding: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100%; }
        #site-img { width: calc(100% + 80px); margin: -40px -40px 30px -40px; max-height: 250px; object-fit: cover; display: none; }
        #site-title { font-size: 2.2rem; margin: 0 0 15px 0; font-weight: 800; }
        #site-body { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        #site-cta { padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; transition: 0.3s; display: none; }

        .engine-footer { padding: 20px; border-top: 1px solid #e2e8f0; background: white; }
        .publish-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="engine-room">
        <div class="engine-header"><h1>NEXUS SITE ENGINE</h1></div>

        <div class="nav-tabs">
            <div class="nav-tab active" onclick="setTab('basics')">CONTENT</div>
            <div class="nav-tab" onclick="setTab('visuals')">STYLE</div>
            <div class="nav-tab" onclick="setTab('social')">DATABASE</div>
        </div>

        <div class="form-container">
            <div id="tab-basics">
                <span class="field-label">Headline</span>
                <input type="text" id="in-title" class="input-box config" data-key="title" oninput="sync()" placeholder="Language Class 2026">
                
                <span class="field-label">Main Message</span>
                <textarea id="in-msg" class="input-box config" data-key="message" oninput="sync()" style="height:100px;" placeholder="Join our trilingual community..."></textarea>
                
                <span class="field-label">Button Text</span>
                <input type="text" id="in-btnText" class="input-box config" data-key="btnText" oninput="sync()" placeholder="Register Now">

                <span class="field-label">Button Link</span>
                <input type="text" id="in-btnLink" class="input-box config" data-key="btnLink" oninput="sync()" placeholder="https://wa.me/...">
            </div>

            <div id="tab-visuals" class="hidden">
                <span class="field-label">Quick Themes</span>
                <div class="preset-grid">
                    <button class="preset-btn" onclick="applyTheme('#ffffff', '#0f172a', 'center')">Light</button>
                    <button class="preset-btn" onclick="applyTheme('#0f172a', '#ffffff', 'left')">Dark</button>
                    <button class="preset-btn" onclick="applyTheme('#fdf2f8', '#831843', 'center')">Pink</button>
                </div>

                <span class="field-label">Background Color</span>
                <input type="color" id="in-bg" class="input-box config" data-key="bgColor" oninput="sync()" value="#ffffff">

                <span class="field-label">Text Color</span>
                <input type="color" id="in-txtColor" class="input-box config" data-key="txtColor" oninput="sync()" value="#0f172a">

                <span class="field-label">Font Family</span>
                <select id="in-font" class="input-box config" data-key="font" onchange="sync()">
                    <option value="'Inter', sans-serif">Modern UI</option>
                    <option value="'Playfair Display', serif">Luxury Serif</option>
                    <option value="'Mali', cursive">Thai Friendly</option>
                    <option value="'ZCOOL XiaoWei', serif">Classic Chinese</option>
                </select>

                <span class="field-label">Cover Image URL</span>
                <input type="url" id="in-img" class="input-box config" data-key="imgUrl" oninput="sync()" placeholder="https://...">
            </div>

            <div id="tab-social" class="hidden">
                <span class="field-label">Cloud Username (Database Key)</span>
                <input type="text" id="username" class="input-box" placeholder="e.g. lesson-01">
                
                <hr>
                <span class="field-label">Search Existing Site</span>
                <input type="text" id="searchUser" class="input-box" placeholder="Enter username...">
                <button class="preset-btn" style="width:100%" onclick="load()">LOAD DATA</button>
            </div>
        </div>

        <div class="engine-footer">
            <button class="publish-btn" onclick="publish()">DEPLOY TO CLOUD</button>
        </div>
    </aside>

    <main class="preview-world">
        <div id="device">
            <div id="device-inner">
                <img id="site-img" src="">
                <h1 id="site-title">Headline</h1>
                <p id="site-body">Your message appears here in real-time.</p>
                <a href="#" id="site-cta">Action Button</a>
            </div>
        </div>
    </main>
</div>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Mali:wght@400;700&family=Playfair+Display:wght@700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

<script>
    // 1. REPLACE THIS WITH YOUR GOOGLE WEB APP URL
    const SCRIPT_URL = "YOUR_NEW_DEPLOYMENT_URL";

    function sync() {
        const config = {};
        document.querySelectorAll('.config').forEach(el => config[el.getAttribute('data-key')] = el.value);

        const dev = document.getElementById('device');
        dev.style.backgroundColor = config.bgColor;
        dev.style.color = config.txtColor;
        dev.style.fontFamily = config.font;

        document.getElementById('site-title').innerText = config.title || "Your Headline";
        document.getElementById('site-body').innerText = config.message || "Your message here...";
        
        const btn = document.getElementById('site-cta');
        btn.innerText = config.btnText || "";
        btn.style.backgroundColor = config.txtColor;
        btn.style.color = config.bgColor;
        btn.style.display = config.btnText ? 'inline-block' : 'none';

        const img = document.getElementById('site-img');
        if(config.imgUrl) { img.src = config.imgUrl; img.style.display = 'block'; }
        else { img.style.display = 'none'; }
    }

    async function publish() {
        const user = document.getElementById('username').value;
        if(!user) return alert("Error: Set a Username in the DATABASE tab!");

        const config = {};
        document.querySelectorAll('.config').forEach(el => config[el.getAttribute('data-key')] = el.value);

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ username: user, config: config })
            });
            alert("🚀 Saved to Google Sheet!");
        } catch(e) { alert("Error connecting to script."); }
    }

    async function load() {
        const user = document.getElementById('searchUser').value;
        try {
            const res = await fetch(`${SCRIPT_URL}?username=${user}`);
            const data = await res.json();
            if(!data) return alert("User not found!");
            
            // Map data back
            document.getElementById('username').value = user;
            document.querySelectorAll('.config').forEach(el => {
                const key = el.getAttribute('data-key');
                if(data[key]) el.value = data[key];
            });
            sync();
        } catch(e) { alert("Load failed."); }
    }

    function setTab(n) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.nav-tab[onclick="setTab('${n}')"]`).classList.add('active');
        ['basics', 'visuals', 'social'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
        document.getElementById(`tab-${n}`).classList.remove('hidden');
    }

    function applyTheme(bg, txt, align) {
        document.getElementById('in-bg').value = bg;
        document.getElementById('in-txtColor').value = txt;
        document.getElementById('device-inner').style.textAlign = align;
        sync();
    }

    sync();
</script>
</body>
</html>
