<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary | Forever</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6d597a; --accent: #b56576; --bg: #f8edeb; --text: #355070; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg) url('https://www.transparenttextures.com/patterns/cubes.png'); color: var(--text); margin: 0; text-align: center; line-height: 1.6; }
        
        /* Surprise Overlay */
        #surprise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 1s;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 30px; margin: 20px auto; max-width: 700px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); position: relative;
        }

        /* Image Containers */
        .img-container { position: relative; display: inline-block; margin: 10px; }
        .main-photo { width: 250px; height: 250px; border-radius: 50%; object-fit: cover; border: 8px solid white; }
        .gallery-img { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; }

        /* Floating Buttons */
        .upload-btn {
            position: absolute; bottom: 10px; right: 10px; background: var(--accent);
            color: white; border: none; border-radius: 50%; width: 35px; height: 35px;
            cursor: pointer; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .delete-btn {
            position: absolute; top: 10px; right: 10px; background: #333;
            color: white; border: none; border-radius: 50%; width: 35px; height: 35px;
            cursor: pointer; font-size: 18px; display: none;
        }
        .img-container:hover .delete-btn { display: block; }

        /* Inputs */
        .name-input { background: transparent; border: none; border-bottom: 2px dashed var(--accent); font-size: 2rem; text-align: center; color: var(--text); width: 200px; }
        .hidden-upload { display: none; }

        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s; }
        #youtube-player { position: absolute; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<div id="youtube-player"></div>

<div id="surprise-overlay" onclick="openSurprise()">
    <div style="font-size: 100px; cursor: pointer;">🎁</div>
    <h2 style="color: white;">Open Your Surprise</h2>
</div>

<header id="main-header">
    <div class="img-container">
        <img src="https://via.placeholder.com/250" id="hero_photo" class="main-photo">
        <button class="upload-btn" onclick="triggerUpload('hero_photo')">+</button>
        <button class="delete-btn" onclick="deletePhoto('hero_photo')">×</button>
    </div>
    
    <div style="margin-top: 20px;">
        <input type="text" id="name1" class="name-input" placeholder="Name 1" onchange="saveName('name1')">
        <span style="font-size: 2rem;">&</span>
        <input type="text" id="name2" class="name-input" placeholder="Name 2" onchange="saveName('name2')">
    </div>
    <div id="counter" style="font-weight: bold; margin-top: 10px;"></div>
</header>

<div id="main-content" style="display: none; padding: 20px;">
    <section class="glass-card">
        <h2>Our Memories</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="img-container">
                <img src="https://via.placeholder.com/300" id="gallery_1" class="gallery-img">
                <button class="upload-btn" onclick="triggerUpload('gallery_1')">+</button>
                <button class="delete-btn" onclick="deletePhoto('gallery_1')">×</button>
            </div>
            <div class="img-container">
                <img src="https://via.placeholder.com/300" id="gallery_2" class="gallery-img">
                <button class="upload-btn" onclick="triggerUpload('gallery_2')">+</button>
                <button class="delete-btn" onclick="deletePhoto('gallery_2')">×</button>
            </div>
        </div>
    </section>

    <input type="file" id="globalUpload" class="hidden-upload" accept="image/*" onchange="processUpload(event)">
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1MAHkEhi84sOhdDPFPrNyJgmETlNU6wyNaTEHzgD7nQhD1ZgcsR3YXGeL8O44NGQ/exec";
    let activeTarget = "";

    // 1. YouTube Setup
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', { height: '0', width: '0', videoId: 'dQw4w9WgXcQ', events: { 'onReady': () => {} } });
    }

    // 2. Surprise Reveal
    function openSurprise() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        if (player) player.playVideo();
        document.getElementById('surprise-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('surprise-overlay').style.visibility = 'hidden';
            document.getElementById('main-header').style.opacity = '1';
            document.getElementById('main-content').style.display = 'block';
        }, 1000);
        updateCounter();
    }

    // 3. Photo Handling
    function triggerUpload(targetId) {
        activeTarget = targetId;
        document.getElementById('globalUpload').click();
    }

    function processUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function() {
            const base64 = reader.result.split(',')[1];
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "upload",
                    key: activeTarget,
                    base64: base64,
                    type: file.type,
                    name: file.name
                })
            });
            const res = await response.json();
            if (res.url) document.getElementById(activeTarget).src = res.url;
        };
        reader.readAsDataURL(file);
    }

    function deletePhoto(targetId) {
        if(confirm("Delete this memory?")) {
            document.getElementById(targetId).src = "https://via.placeholder.com/300";
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", key: targetId }) });
        }
    }

    // 4. Name Handling
    async function saveName(id) {
        const val = document.getElementById(id).value;
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "save_text", key: id, value: val })
        });
    }

    function updateCounter() {
        const days = Math.floor((new Date() - new Date("2024-01-01")) / (1000 * 60 * 60 * 24));
        document.getElementById("counter").innerText = days + " Days of Us";
    }

    // Load YouTube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
