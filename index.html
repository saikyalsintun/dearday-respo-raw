<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --primary: #4285f4; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { color: #333; margin-top: 0; }
    label { display: block; margin: 10px 0 5px; font-size: 14px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-size: 16px; }
    .btn-secondary { background: #666; margin-top: 10px; }
    .hidden { display: none; }
    
    /* Dynamic Styles for the Generated Page */
    #page-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  </style>
</head>
<body>

  <div id="dashboard" class="container">
    <h2>Site Dashboard</h2>
    
    <label>Target Username</label>
    <input type="text" id="username" placeholder="e.g. party2026">

    <label>Display Name</label>
    <input type="text" id="name" class="config" data-key="name">

    <label>Message</label>
    <textarea id="message" class="config" data-key="message"></textarea>

    <label>Theme Color</label>
    <input type="color" id="bgColor" class="config" data-key="bgColor" value="#ffffff">

    <label>Font Style</label>
    <select id="font" class="config" data-key="font">
      <option value="Arial">Sans-Serif</option>
      <option value="'Times New Roman'">Serif</option>
      <option value="monospace">Typewriter</option>
    </select>

    <label>Layout Style</label>
    <select id="layout" class="config" data-key="layout">
        <option value="center">Centered</option>
        <option value="flex-start">Top Aligned</option>
    </select>

    <button class="btn" onclick="publish()">Publish & Save</button>
    
    <hr style="margin: 20px 0;">
    
    <input type="text" id="searchUser" placeholder="Enter username to visit...">
    <button class="btn btn-secondary" onclick="loadUserSite()">View Website</button>
  </div>

  <div id="page-preview" class="hidden">
    <button style="position:absolute; top:20px; left:20px;" onclick="location.reload()">Return to Dashboard</button>
    <h1 id="out-name"></h1>
    <p id="out-message"></p>
  </div>

  <script>
    function publish() {
      const user = document.getElementById('username').value;
      if(!user) return alert("Please enter a username");

      // Automatically collects EVERYTHING with the class "config"
      const config = {};
      document.querySelectorAll('.config').forEach(input => {
        config[input.getAttribute('data-key')] = input.value;
      });

      google.script.run.withSuccessHandler(msg => alert(msg)).saveWebsite(user, config);
    }

    function loadUserSite() {
      const user = document.getElementById('searchUser').value;
      google.script.run.withSuccessHandler(config => {
        if(!config) return alert("User not found");

        document.getElementById('dashboard').classList.add('hidden');
        const view = document.getElementById('page-preview');
        view.classList.remove('hidden');

        // Apply any settings found in the Config JSON
        view.style.backgroundColor = config.bgColor;
        view.style.fontFamily = config.font;
        view.style.justifyContent = config.layout;
        
        document.getElementById('out-name').innerText = config.name;
        document.getElementById('out-message').innerText = config.message;
        
      }).getWebsiteData(user);
    }
  </script>
</body>
</html>
